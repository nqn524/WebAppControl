<!DOCTYPE html>

<html>
  <head>
    <title>RC Car Controller</title>

    <!-- NippleJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <style>
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #111;
        color: white;
        font-family: Arial;
        text-align: center;
      }

      footer {
        text-align: center;
        bottom: 0;
        left: 0;
        width: 100%;
        position: fixed;
      }

      #connectBtn {
        margin: 20px;
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 10px;
        border: none;
      }

      #connectBtn:active {
        transform: translateY(4px);
      }

      #controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin: 40px auto;
        width: fit-content;
      }

      #buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      #joystick {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 0;
        background: #222;
        border-radius: 50%;
        overflow: hidden;
      }

      #btnA {
        margin: 0px;
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 10px;
        border: none;
      }
      
      #btnB {
        margin: 0px;
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 10px;
        border: none;
      }

      #btnC {
        margin: 0px;
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 10px;
        border: none;
      }

      #btnA:active {
        transform: translateY(4px);
      }
      #btnB:active {
        transform: translateY(4px);
      }
      #btnC:active {
        transform: translateY(4px);
      }

      #rightPanel {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      
      #sliderContainer {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #sliderWrapper {
        height: 150px;
        display: flex;
        align-items: center; 
        justify-content: center;
      }

      #slider1 {
        width: 150px;
        transform: rotate(-90deg);
      }

      #sliderValue {
        margin-top: 10px;
        font-size: 16px;
      }

      @media (max-width: 900px) and (orientation: landscape) {
        body {
          touch-action: none;
          overflow: hidden;
        }
      
        #controls {
          display: flex;
          justify-content: space-between;
          align-items: center;
          width: 100%;
          height: 80vh;
          padding: 20px;
          box-sizing: border-box;
        }
      
        #joystick {
          width: 40vh;
          height: 40vh;
          max-width: none;
          max-height: none;
        }
      
        #buttons {
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 25px;
          margin-right: 20px;
        }
      
        #buttons button {
          width: 80px;
          height: 80px;
          font-size: 24px;
          border-radius: 50%;
        }
      
        #connectBtn {
          position: absolute;
          top: 10px;
          left: 10px;
          width: auto;
          padding: 10px 15px;
          font-size: 16px;
        }
      
        #status, #errorLbl {
          position: absolute;
          top: 10px;
          left: 120px;
          font-size: 14px;
          text-align: left;
        }

        #rightPanel {
          gap: 40px;
        }
      
        #slider1 {
          width: 200px;
        }
      }
    </style>
  </head>

  <body>
    <div id="controls">
      <div id="rightPanel">
        <div id="buttons">
          <button id="btnA">100%</button>
          <button id="btnB">50%</button>
          <button id="btnC">0%</button>
        </div>
      
        <div id="sliderContainer">
          <div id="sliderWrapper">
            <input id="slider1" type="range" min="0" max="255" value="128">
          </div>
          <div id="sliderValue">128</div>
        </div>
      </div>

      <div id="joystick"></div>
    </div>
    
    <button id="connectBtn">Connect</button>
    <div id="status">Disconnected</div>
    <div id="errorLbl"></div>

    <footer>
      <p>Author: Karl Smirthwaite<br>
        <a href="mailto:nqn524@york.ac.uk">nqn524@york.ac.uk</a></p>
      <p>Github<br>
        <a href="https://github.com/nqn524/WebAppControl">github.com/nqn524/WebAppControl</a></p>
    </footer>

    <script>
      let showOutput = false;

      let characteristic;
      let lastSend = 0;
      let device = null;

      const keysDown = new Object();
      keysDown.w = false;
      keysDown.a = false;
      keysDown.s = false;
      keysDown.d = false;

      const statusText = document.getElementById("status");
      const errorText = document.getElementById("errorLbl")
      
      const slider = document.getElementById("slider1");
      const sliderValue = document.getElementById("sliderValue");

      // CUSTOM UUIDs 
      var SERVICE_UUID = "12345678-1234-1234-1234-123456789abc";
      var CHAR_UUID    = "abcdef01-1234-1234-1234-123456789abc";

      // ================= BLE CONNECT =================
      errorText.onclick = async () => {
        errorText.innerText = "";
      }

      document.getElementById("connectBtn").onclick = async () => {
        try {

          if (device) {
            console.log("Forcing disconnect...");
            device.gatt.disconnect();

            // give BLE time to reset
            await new Promise(resolve => setTimeout(resolve, 3000));

            device = null;
            characteristic = null;
          }

          device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "RC-Car" }],
            optionalServices: [SERVICE_UUID]
          });
        
          const server = await device.gatt.connect();
          const service = await server.getPrimaryService(SERVICE_UUID);
          characteristic = await service.getCharacteristic(CHAR_UUID);
          
          statusText.innerText = "Connected";
          errorText.innerText = "";
          console.log("Connected");
        } catch (err) {
          console.error(err);
          errorText.innerText = err;
          statusText.innerText = "Error occured. Please wait and try again in a moment"
          await new Promise(resolve => setTimeout(resolve, 3000));
          //location.reload();
        }
      };

      // ================= JOYSTICK =================
      const manager = nipplejs.create({
        zone: document.getElementById('joystick'),
        mode: 'static',
        position: { left: '50%', top: '50%' },
        color: 'white',
        size: 200
      });

      document.getElementById("btnA").onclick = async () => {
        //send(document.getElementById("btnA").innerText);
        updateSlider(255);
      }

      document.getElementById("btnB").onclick = async () => {
        //send(document.getElementById("btnB").innerText);
        updateSlider(128);
      }

      document.getElementById("btnC").onclick = async () => {
        //send(document.getElementById("btnC").innerText);
        updateSlider(0)
      }

      slider.oninput = () => {
        const val = slider.value;
        sliderValue.innerText = val;
      };

      slider.onchange = () => {
        const val = slider.value;
      
        send("sl," + val);
      };

      document.onkeydown = (e) => {
        e = e || window.event;


        ketState(e.key, true);
        keyToJs();
      }

      document.onkeyup = (e) => {
        e = e || window.event;


        ketState(e.key, false);
        keyToJs();
      }

      function updateSlider(newVal) {
        sliderValue.innerText = newVal;
        slider.value = newVal;
        send("sl," + newVal);
      }

      function ketState(btn, state) {
        switch (btn) {
          case "w":
            keysDown.w = state;
            break;
          case "a":
            keysDown.a = state;
            break;
          case "s":
            keysDown.s = state;
            break;
          case "d":
            keysDown.d = state;
            break;

          case "1":
            keysDown.n1 = state;
            break;
          case "2":
            keysDown.n2 = state;
            break;
          case "3":
            keysDown.n3 = state;
            break;
          case "4":
            keysDown.n4 = state;
            break;
          case "5":
            keysDown.n5 = state;
            break;
          case "6":
            keysDown.n6 = state;
            break;
          case "7":
            keysDown.n7 = state;
            break;
          case "8":
            keysDown.n8 = state;
            break;
          case "9":
            keysDown.n9 = state;
            break;
          case "0":
            keysDown.n0 = state;
            break;

          default:
            break;
        }
      }

      async function keyToJs() {
        let w = keysDown.w;
        let a = keysDown.a;
        let s = keysDown.s;
        let d = keysDown.d;

        let y = 0;
        let x = 0;

        if (w) { y = y + 1 }
        if (s) { y = y - 1 }
        if (d) { x = x + 1 }
        if (a) { x = x - 1 }

        if (y == 1 && x == 0) { // N
          jsSend(0, -1);
        }
        if (y == 1 && x == 1) { // NE
          jsSend(2/3, -2/3);
        }
        if (y == 0 && x == 1) { // E
          jsSend(1, 0);
        }
        if (y == -1 && x == 1) { // SE
          jsSend(2/3, 2/3);
        }


        if (y == -1 && x == 0) { // S
          jsSend(0, 1);
        }
        if (y == -1 && x == -1) { // SW
          jsSend(-2/3, 2/3);
        }
        if (y == 0 && x == -1) { // W
          jsSend(-1, 0);
        }
        if (y == 1 && x == -1) { // NW
          jsSend(-2/3, -2/3);
        }

        if (keysDown.n1) {
          updateSlider(0)
          keysDown.n1 = false;
        }
      }

      // Deadzone
      function applyDeadzone(v) {
        return Math.abs(v) < 0.1 ? 0 : v;
      }

      // Send data
      let sending = false;

      async function jsSend(x, y) {
        send("js," + Math.round((x + 1) * 127.5).toString() + "," + (255-Math.round((y + 1) * 127.5)).toString());
        return;
      }

      async function send(dataToSend) {
        if (showOutput) console.log(dataToSend);
        if (!characteristic || sending) return;
      
        let now = Date.now();
        if (now - lastSend < 50) return;
      
        lastSend = now;
        sending = true;
      
        try {
          const text = dataToSend;
          const encoder = new TextEncoder();
          const data = encoder.encode(text);

          await characteristic.writeValue(data);
        } catch (err) {
          console.error(err);
        }
      
        sending = false;
      }

      // Move event
      manager.on('move', function (evt, data) {
        if (!data.vector) return;
      
        let x = applyDeadzone(data.vector.x);
        let y = applyDeadzone(-data.vector.y); // invert Y

        jsSend(x,y);
      });

      manager.on('end', function () {
        jsSend(0, 0);
      });
    </script>

  </body>
</html>
