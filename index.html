<!DOCTYPE html>

<html>
  <head>
    <title>RC Car Controller</title>

    <!-- NippleJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <style>
      body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial;
        text-align: center;
      }

      #connectBtn {
        margin: 20px;
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 10px;
        border: none;
      }

      #joystick {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 40px auto;
        background: #222;
        border-radius: 50%;
        overflow: hidden; /* helps visually */
      }

      /* The switch - the box around the slider */
      .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
      }

      /* Hide default HTML checkbox */
      .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      }

      .slidecontainer {
        height: 100px; /* Width of the outside container */
        margin-right: auto;
        margin-left: 50%;
        margin-top: 10px;
        margin-bottom: auto;
      }
      
      /* The slider itself */
      .slider {
        -webkit-appearance: none;  /* Override default CSS styles */
        appearance: none;
        height: 50%; /* Full-width */
        width: 25px; /* Specified height */
        background: #d3d3d3; /* Grey background */
        outline: none; /* Remove outline */
        opacity: 0.7; /* Set transparency (for mouse-over effects on hover) */
        -webkit-transition: .2s; /* 0.2 seconds transition on hover */
        transition: opacity .2s;
      }
      
      /* Mouse-over effects */
      .slider:hover {
        opacity: 1; /* Fully shown on mouse-over */
      }
      
      /* The slider handle (use -webkit- (Chrome, Opera, Safari, Edge) and -moz- (Firefox) to override default look) */
      .slider::-webkit-slider-thumb {
        -webkit-appearance: none; /* Override default look */
        appearance: none;
        width: 25px; /* Set a specific slider handle width */
        height: 25px; /* Slider handle height */
        background: #ff0000; /* Green background */
        cursor: pointer; /* Cursor on hover */
      }
      
      .slider::-moz-range-thumb {
        width: 25px; /* Set a specific slider handle width */
        height: 25px; /* Slider handle height */
        background: #04AA6D; /* Green background */
        cursor: pointer; /* Cursor on hover */
      }

      input[type=range][orient=vertical] {
        writing-mode: vertical-lr;
        direction: rtl;
        appearance: slider-vertical;
        width: 16px;
        height: 200px;
        vertical-align: bottom;
      }

      #btnPrevious{
        float:left;
      }
      #spanStage{
        font-weight: bold;
        vertical-align: middle;
      }
      #btnNext{
        float: right;
      }

      .container {
        padding-left: 20%;
  display: grid;
  grid-template-columns: auto auto auto;
}
.container div {
  text-align: center;
}
    </style>

    
  </head>


  <body>

    <h1>RC Controller</h1>
    <button id="connectBtn">Connect</button>
    <div id="status">Disconnected</div>
    <div id="errorLbl"></div>

    
    <div class="container">
      <div id="joystick"></div>

      <div class="slidecontainer">
        <input type="range" min="1" max="100" value="50" class="slider" id="speedControl" orient="vertical">
      </div>
    </div>

    <script>
      let characteristic;
      let lastSend = 0;
      let device = null;

      const statusText = document.getElementById("status");
      const errorText = document.getElementById("errorLbl")

      // CUSTOM UUIDs 
      const SERVICE_UUID = "12345678-1234-1234-1234-123456789abc";
      const CHAR_UUID    = "abcdef01-1234-1234-1234-123456789abc";

      // ================= BLE CONNECT =================
      errorText.onclick = async () => {
        errorText.innerText = "";
      }

      document.getElementById("connectBtn").onclick = async () => {
        try {

          if (device) {
            console.log("Forcing disconnect...");
            device.gatt.disconnect();

            // give BLE time to reset
            await new Promise(resolve => setTimeout(resolve, 3000));

            device = null;
            characteristic = null;
          }

          device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "RC-Car" }],
            optionalServices: [SERVICE_UUID]
          });
        
          const server = await device.gatt.connect();
          const service = await server.getPrimaryService(SERVICE_UUID);
          characteristic = await service.getCharacteristic(CHAR_UUID);
          
          statusText.innerText = "Connected";
          errorText.innerText = "";
          console.log("Connected");
        } catch (err) {
          console.error(err);
          errorText.innerText = err;
          statusText.innerText = "Error occured. Please wait and try again in a moment"
          await new Promise(resolve => setTimeout(resolve, 3000));
          //location.reload();
        }
      };

      // ================= JOYSTICK =================
      const manager = nipplejs.create({
        zone: document.getElementById('joystick'),
        mode: 'static',
        position: { left: '50%', top: '50%' },
        color: 'white',
        size: 200
      });

      // Deadzone
      function applyDeadzone(v) {
        return Math.abs(v) < 0.1 ? 0 : v;
      }

      // Send data
      let sending = false;

      async function jsSend(x, y) {
        send("js" + Math.round((x + 1) * 127.5).toString() + "," + (255-Math.round((y + 1) * 127.5)).toString());
        return;
      }

      async function send(dataToSend) {
        if (!characteristic || sending) return;
      
        let now = Date.now();
        if (now - lastSend < 50) return;
      
        lastSend = now;
        sending = true;
      
        try {
          const text = dataToSend;
          const encoder = new TextEncoder();
          const data = encoder.encode(text);

          await characteristic.writeValue(data);
        } catch (err) {
          console.error(err);
        }
      
        sending = false;
      }

      // Move event
      manager.on('move', function (evt, data) {
        if (!data.vector) return;
      
        let x = applyDeadzone(data.vector.x);
        let y = applyDeadzone(-data.vector.y); // invert Y
      
        jsSend(x,y);
      });

      manager.on('end', function () {
        send(0, 0);
      });

      // ========== SLIDER ===========

      document.getElementById("speedControl").onchange = () => {
        // TODO
      }
    </script>

  </body>
</html>
